<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2L6 課文閱讀 句型與色彩對齊重組練習</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #F8FAFC;
            --container-bg: #FFFFFF;
            --text-main: #1E293B;
            --border-color: #CBD5E1;
            --success-light: #E8F5E9;
            --success-border: #A5D6A7;
            --wrong-light: #FFEBEE;
            --wrong-border: #EF9A9A;
            --warning-color: #D84315;
        }
        
        /* 語意區塊專屬顏色 (高對比、好閱讀) */
        .color-0 { background-color: #2980b9 !important; color: white !important; } /* 藍：主詞/核心 */
        .color-1 { background-color: #27ae60 !important; color: white !important; } /* 綠：動詞/動作 */
        .color-2 { background-color: #d35400 !important; color: white !important; } /* 橘：受詞/地方 */
        .color-3 { background-color: #8e44ad !important; color: white !important; } /* 紫：介系詞/修飾 */
        .color-4 { background-color: #c0392b !important; color: white !important; } /* 紅：時間/子句/額外 */

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: var(--container-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: transform 0.1s ease-in-out;
        }
        .shake {
            animation: shake 0.4s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        h1 {
            text-align: center;
            color: #334155;
            font-size: 1.8rem;
            margin-bottom: 20px;
        }
        /* 頁籤導覽 (四個段落) */
        .tabs {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #E2E8F0;
            padding-bottom: 15px;
        }
        .tab-btn {
            background: none;
            border: 2px solid #3b82f6;
            color: #3b82f6;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        .tab-btn:hover { background-color: #EFF6FF; }
        .tab-btn.active { background-color: #3b82f6; color: white; }

        .progress {
            text-align: center;
            color: #64748B;
            margin-bottom: 15px;
            font-size: 1rem;
            font-weight: bold;
        }
        .instructions {
            background-color: #F1F5F9;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            border-left: 4px solid #3b82f6;
        }
        .drop-zone {
            min-height: 70px;
            background-color: #FCFDFE;
            border: 2px dashed #94A3B8;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .pool {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
            min-height: 70px;
            background-color: #F8FAFC;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #E2E8F0;
        }
        .chunk {
            padding: 12px 18px;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
            font-size: 1.1rem;
            font-weight: 500;
            box-shadow: 0 4px 6px rgba(0,0,0,0.06);
            transition: all 0.15s ease;
        }
        .chunk:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.12);
        }
        
        .actions { text-align: center; }
        button.btn {
            background-color: #10B981;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: bold;
        }
        button.btn:hover { background-color: #059669; }
        button.btn:disabled { background-color: #CBD5E1; cursor: not-allowed; }

        .feedback {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            display: none;
            animation: fadeIn 0.35s ease-out;
        }
        .feedback.correct {
            background-color: var(--success-light);
            border: 1px solid var(--success-border);
            display: block;
        }
        .feedback.wrong {
            background-color: var(--wrong-light);
            border: 1px solid var(--wrong-border);
            display: block;
        }
        .hint-text {
            color: var(--warning-color);
            font-weight: bold;
            margin-top: 8px;
            font-size: 1rem;
            line-height: 1.4;
        }
        .translation {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 15px 0;
            padding: 10px;
            background: white;
            border-radius: 6px;
            border-left: 5px solid #009688;
            line-height: 1.6;
        }
        .translation span {
            margin: 0 2px;
            padding: 1px 4px;
            border-radius: 4px;
            background-color: #F8FAFC; 
        }
        .tips {
            background: white;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #F59E0B;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .tips b { color: #B45309; }
        
        .next-btn-container {
            margin-top: 20px;
            text-align: right;
        }
        button.btn-next { background-color: #3B82F6; }
        button.btn-next:hover { background-color: #2563EB; }
        button.btn-audio { background-color: #8B5CF6; margin-right: 10px; }
        button.btn-audio:hover { background-color: #7C3AED; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <h1>📖 B2L6 課文閱讀 句構重組挑戰</h1>
    
    <div class="tabs">
        <button class="tab-btn active" id="tab-para1" onclick="switchTab('para1')">第一段 (求職詐騙現況)</button>
        <button class="tab-btn" id="tab-para2" onclick="switchTab('para2')">第二段 (人頭帳戶案例)</button>
        <button class="tab-btn" id="tab-para3" onclick="switchTab('para3')">第三段 (車手案例)</button>
        <button class="tab-btn" id="tab-para4" onclick="switchTab('para4')">第四段 (警方建議)</button>
    </div>

    <div class="progress" id="progress-text">題目 1</div>
    
    <div class="instructions">
        💡 <b>學習提示：</b> 相同顏色的英文區塊與中文單字互為對譯。請將深色方塊排入正確的英文邏輯順序！<br>
        <i>(請特別觀察：中文的修飾語(紫色)或地點(紅色)常常跟英文的位置相反喔！)</i>
    </div>

    <div class="drop-zone" id="answer-zone"></div>
    <div class="pool" id="word-pool"></div>

    <div class="actions">
        <button class="btn" id="check-btn" onclick="checkAnswer()">檢查答案</button>
    </div>

    <div class="feedback" id="feedback-zone">
        <div id="feedback-msg" style="font-weight: bold; font-size: 1.2rem;"></div>
        <div id="hint-msg" class="hint-text"></div>
        <div class="translation" id="translation-text"></div>
        <div class="tips" id="tips-text"></div>
        
        <div class="next-btn-container">
            <button class="btn btn-audio" onclick="playCurrentTTS()" id="audio-btn" style="display: none;">🔊 聽完整朗讀</button>
            <button class="btn btn-next" onclick="nextQuestion()" id="next-btn">下一題 ➔</button>
        </div>
    </div>
</div>

<script>
    // Web Audio API
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTone(freq, type, duration) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }
    function playCorrectSound() {
        playTone(523.25, 'sine', 0.08); setTimeout(() => playTone(659.25, 'sine', 0.08), 80); setTimeout(() => playTone(783.99, 'sine', 0.15), 160);
    }
    function playWrongSound() {
        playTone(280, 'triangle', 0.12); setTimeout(() => playTone(220, 'triangle', 0.2), 120);
    }
    function playTTS(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US'; utterance.rate = 0.85; 
            window.speechSynthesis.speak(utterance);
        }
    }

    // 題庫資料
    const questionData = {
        para1: [
            {
                chunks: ["Summer vacation", "is coming,", "and there are", "many students", "hoping to earn money."],
                translationHtml: "中譯：<span style='color:#2980b9'>暑假</span><span style='color:#27ae60'>即將到來，</span><span style='color:#d35400'>而且有</span><span style='color:#8e44ad'>許多學生</span><span style='color:#c0392b'>希望能賺點錢。</span>",
                tip: "💡 <b>解說：</b><br>and there are 引導一個子句，表示「而且有...」。"
            },
            {
                chunks: ["Because they are new", "to the job market,", "it is easier", "for them to become", "victims of job scams."],
                translationHtml: "中譯：<span style='color:#2980b9'>因為他們不熟悉</span><span style='color:#27ae60'>就業市場，</span><span style='color:#d35400'>這比較容易</span><span style='color:#8e44ad'>讓他們成為</span><span style='color:#c0392b'>求職詐騙的受害者。</span>",
                tip: "💡 <b>解說：</b><br>be new to... 是指對...不熟悉/是新手。it is easier for them to... 則是常見的虛主詞句型。"
            },
            {
                chunks: ["They see advertisements", "that promise", "high pay", "for", "easy work."],
                translationHtml: "中譯：<span style='color:#2980b9'>他們看到廣告</span><span style='color:#27ae60'>承諾著</span><span style='color:#8e44ad'>針對</span><span style='color:#c0392b'>輕鬆的工作</span><span style='color:#d35400'>給予高薪。</span>",
                tip: "💡 <b>解說：</b><br>that promise high pay 是形容詞子句，用來修飾前面的 advertisements(廣告)。英文的介系詞 for (針對/對於) 會放在後面。"
            }
        ],
        para2: [
            {
                chunks: ["Zoe,", "a sixteen-year-old student,", "saw an ad", "for", "easy work."],
                translationHtml: "中譯：<span style='color:#2980b9'>柔依，</span><span style='color:#27ae60'>一位十六歲的學生，</span><span style='color:#d35400'>看到了一則廣告</span><span style='color:#c0392b'>關於</span><span style='color:#8e44ad'>輕鬆工作的。</span>",
                tip: "💡 <b>解說：</b><br>an ad for easy work，for 在此解釋為「尋找...的/關於...的」。"
            },
            {
                chunks: ["When she called", "to ask about the job,", "the man", "on the phone", "quickly hired her."],
                translationHtml: "中譯：<span style='color:#2980b9'>當她打電話</span><span style='color:#27ae60'>詢問這份工作時，</span><span style='color:#d35400'>那男人</span><span style='color:#8e44ad'>在電話裡的</span><span style='color:#c0392b'>很快雇用了她。</span>",
                tip: "💡 <b>解說：</b><br>注意英文把 on the phone (在電話裡的) 放在 the man 之後做後位修飾，中文則會放在名詞前面！"
            },
            {
                chunks: ["Then, he persuaded Zoe", "to provide", "her bank account details", "to receive", "her pay."],
                translationHtml: "中譯：<span style='color:#2980b9'>然後，他說服柔依</span><span style='color:#27ae60'>去提供</span><span style='color:#d35400'>她的銀行帳戶詳細資料</span><span style='color:#8e44ad'>為了接收</span><span style='color:#c0392b'>她的薪水。</span>",
                tip: "💡 <b>解說：</b><br>persuade sb to V：說服某人去做某事。"
            }
        ],
        para3: [
            {
                chunks: ["Seventeen-year-old Joe", "noticed", "a job ad", "on", "Facebook."],
                translationHtml: "中譯：<span style='color:#2980b9'>十七歲的喬</span><span style='color:#8e44ad'>在</span><span style='color:#c0392b'>臉書上</span><span style='color:#27ae60'>注意到</span><span style='color:#d35400'>一則徵才廣告。</span>",
                tip: "💡 <b>解說：</b><br>中文習慣把地方(在臉書上)放在動詞(注意到)前面；但英文介系詞片語 on Facebook 通常放在句尾！"
            },
            {
                chunks: ["It offered", "NT$5,000 a day", "with", "flexible", "working hours."],
                translationHtml: "中譯：<span style='color:#2980b9'>它提供了</span><span style='color:#27ae60'>一天五千元</span><span style='color:#d35400'>附帶</span><span style='color:#8e44ad'>彈性的</span><span style='color:#c0392b'>工作時間。</span>",
                tip: "💡 <b>解說：</b><br>with 在這裡指「具有、附帶」。"
            },
            {
                chunks: ["Soon, he was given", "some ATM cards", "and asked to", "withdraw money", "from unknown accounts."],
                translationHtml: "中譯：<span style='color:#2980b9'>很快地，他被給予</span><span style='color:#27ae60'>幾張提款卡</span><span style='color:#d35400'>並被要求</span><span style='color:#8e44ad'>提領現金</span><span style='color:#c0392b'>從幾個未知的帳戶。</span>",
                tip: "💡 <b>解說：</b><br>withdraw money from... 從...提領出現金。"
            },
            {
                chunks: ["The scamming group", "was using it", "to track", "Joe's", "movements."],
                translationHtml: "中譯：<span style='color:#2980b9'>這個詐騙集團</span><span style='color:#27ae60'>正在使用它</span><span style='color:#d35400'>來追蹤</span><span style='color:#8e44ad'>喬的</span><span style='color:#c0392b'>動態。</span>",
                tip: "💡 <b>解說：</b><br>use sth to V：使用某物來做某事。"
            }
        ],
        para4: [
            {
                chunks: ["The police advise", "young people", "to watch out for", "job", "scams."],
                translationHtml: "中譯：<span style='color:#2980b9'>警方建議</span><span style='color:#27ae60'>年輕人</span><span style='color:#d35400'>去提防</span><span style='color:#8e44ad'>求職</span><span style='color:#c0392b'>詐騙。</span>",
                tip: "💡 <b>解說：</b><br>advise sb to V：建議某人去做某事。watch out for 是「提防/小心」的重要片語！"
            },
            {
                chunks: ["For example,", "let your family know", "before you go", "for", "a job interview."],
                translationHtml: "中譯：<span style='color:#2980b9'>舉例來說，</span><span style='color:#d35400'>在你前往</span><span style='color:#8e44ad'>進行</span><span style='color:#c0392b'>工作面試</span><span style='color:#d35400'>之前，</span><span style='color:#27ae60'>讓你的家人知道。</span>",
                tip: "💡 <b>解說：</b><br>這句是祈使句，由原形動詞 let 開頭。英文把 let your family know 放前面，中文常把時間條件(在...之前)放到最前面說。"
            },
            {
                chunks: ["Remember, there are", "plenty of", "summer jobs", "offered by", "real companies."],
                translationHtml: "中譯：<span style='color:#2980b9'>記住，有</span><span style='color:#27ae60'>大量的</span><span style='color:#c0392b'>真正公司</span><span style='color:#8e44ad'>所提供的</span><span style='color:#d35400'>暑期工作。</span>",
                tip: "💡 <b>解說：</b><br>offered by real companies 是過去分詞片語，用來後位修飾 summer jobs！中文則會把「真正公司提供的」放到名詞前面。"
            }
        ]
    };

    let currentSection = 'para1';
    let currentQIndex = 0;
    let selectedOrder = []; 
    let poolWords = [];     
    let failCount = 0;

    const mainContainer = document.getElementById('main-container');
    const answerZone = document.getElementById('answer-zone');
    const wordPool = document.getElementById('word-pool');
    const feedbackZone = document.getElementById('feedback-zone');
    const checkBtn = document.getElementById('check-btn');

    function switchTab(section) {
        currentSection = section;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${section}`).classList.add('active');
        currentQIndex = 0;
        initGame();
    }

    function initGame() {
        const questions = questionData[currentSection];
        failCount = 0;
        document.getElementById('progress-text').innerText = `題目 ${currentQIndex + 1} / ${questions.length}`;
        
        let currentQ = questions[currentQIndex];
        let mappedChunks = currentQ.chunks.map((text, idx) => {
            return { text: text, origIndex: idx };
        });

        poolWords = [...mappedChunks].sort(() => Math.random() - 0.5);
        selectedOrder = [];

        feedbackZone.className = 'feedback';
        checkBtn.disabled = true;
        document.getElementById('audio-btn').style.display = 'none';
        render();
    }

    function render() {
        answerZone.innerHTML = '';
        wordPool.innerHTML = '';

        selectedOrder.forEach((item, index) => {
            const block = document.createElement('div');
            block.className = `chunk color-${item.origIndex}`;
            block.innerText = item.text;
            block.onclick = () => moveToPool(index);
            answerZone.appendChild(block);
        });

        poolWords.forEach((item, index) => {
            const block = document.createElement('div');
            block.className = `chunk color-${item.origIndex}`;
            block.innerText = item.text;
            block.onclick = () => moveToAnswer(index);
            wordPool.appendChild(block);
        });

        checkBtn.disabled = (poolWords.length !== 0);
    }

    function moveToAnswer(poolIndex) {
        feedbackZone.className = 'feedback';
        const item = poolWords.splice(poolIndex, 1)[0];
        selectedOrder.push(item);
        render();
    }

    function moveToPool(answerIndex) {
        feedbackZone.className = 'feedback';
        const item = selectedOrder.splice(answerIndex, 1)[0];
        poolWords.push(item);
        render();
    }

    function playCurrentTTS() {
        const currentQ = questionData[currentSection][currentQIndex];
        playTTS(currentQ.chunks.join(' '));
    }

    function checkAnswer() {
        const currentQ = questionData[currentSection][currentQIndex];
        
        let isCorrect = true;
        for(let i = 0; i < selectedOrder.length; i++) {
            if(selectedOrder[i].origIndex !== i) {
                isCorrect = false;
                break;
            }
        }

        const msgBox = document.getElementById('feedback-msg');
        const hintBox = document.getElementById('hint-msg');
        const translationBox = document.getElementById('translation-text');
        const tipsBox = document.getElementById('tips-text');
        const nextBtn = document.getElementById('next-btn');
        const audioBtn = document.getElementById('audio-btn');

        if(isCorrect) {
            playCorrectSound();
            confetti({ particleCount: 120, spread: 80, origin: { y: 0.6 } });
            
            feedbackZone.className = 'feedback correct';
            msgBox.innerHTML = '🎉 太棒了！順序完全正確！';
            msgBox.style.color = '#2E7D32';
            hintBox.innerHTML = '';
            
            translationBox.innerHTML = currentQ.translationHtml;
            tipsBox.innerHTML = currentQ.tip;
            
            checkBtn.style.display = 'none';
            audioBtn.style.display = 'inline-block';
            nextBtn.style.display = 'inline-block';
            
            setTimeout(playCurrentTTS, 400);
            
        } else {
            failCount++;
            playWrongSound();
            
            mainContainer.classList.remove('shake');
            void mainContainer.offsetWidth;
            mainContainer.classList.add('shake');

            feedbackZone.className = 'feedback wrong';
            msgBox.innerHTML = '💪 順序不對唷！再試一次，你可以的！';
            msgBox.style.color = '#C62828';
            translationBox.innerText = '';
            tipsBox.innerHTML = '';
            nextBtn.style.display = 'none';
            audioBtn.style.display = 'none';

            let hintHtml = `🔍 <b>作答提示：</b> 第一個積木應該是 <b><span class="color-${0}" style="padding:2px 6px; border-radius:4px; color:white;">${currentQ.chunks[0]}</span></b>`;
            if(failCount >= 2) {
                hintHtml += ` ，緊接著第二個是 <b><span class="color-${1}" style="padding:2px 6px; border-radius:4px; color:white;">${currentQ.chunks[1]}</span></b>`;
                setTimeout(playCurrentTTS, 400);
            }
            hintBox.innerHTML = hintHtml;
        }
    }

    function nextQuestion() {
        currentQIndex++;
        const questions = questionData[currentSection];
        
        if(currentQIndex >= questions.length) {
            alert("🎉 恭喜你！完成本段落所有練習了！請點擊上方頁籤切換其他段落喔！");
            currentQIndex = 0; 
        }
        
        checkBtn.style.display = 'inline-block';
        window.speechSynthesis.cancel();
        initGame();
    }

    initGame();
</script>
</body>
</html>
